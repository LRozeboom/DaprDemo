apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.redis
  version: v1
  # Generous init timeout: sidecars can start before the Redis container is ready, and
  # daprd's 5s default kills the whole sidecar on a slow first pull.
  initTimeout: 120s
  metadata:
  - name: redisHost
    value: localhost:6390
  - name: redisPassword
    value: daprdemos
  # Aspire 13 runs the Redis container with TLS on by default (self-signed dev cert);
  # Dapr's Redis client skips certificate verification when enableTLS is set.
  - name: enableTLS
    value: "true"
scopes:
- demo03-worker-a
- demo03-worker-b
