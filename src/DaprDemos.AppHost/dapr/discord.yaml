# HTTP output binding aimed at a Discord webhook. The URL is resolved from the
# DISCORD_WEBHOOK_URL environment variable via the envvar-secrets store — never hardcoded.
# Scoped to demo04-api so a missing webhook URL cannot break the other demos' sidecars.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: discord
spec:
  type: bindings.http
  version: v1
  metadata:
  - name: url
    secretKeyRef:
      name: DISCORD_WEBHOOK_URL
      key: DISCORD_WEBHOOK_URL
auth:
  secretStore: envvar-secrets
scopes:
- demo04-api
