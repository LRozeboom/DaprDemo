# Starting state: Redis pub/sub. During demo 01 this file is overwritten with the contents
# of pubsub.rabbitmq.yaml.disabled — same component name, different broker, zero code changes.
# The low redeliverInterval makes demo 02's retries fast enough to watch live.
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  # Generous init timeout: sidecars can start before the Redis container is ready, and
  # daprd's 5s default kills the whole sidecar on a slow first pull.
  initTimeout: 120s
  metadata:
  - name: redisHost
    value: localhost:6390
  - name: redisPassword
    value: daprdemos
  # Aspire 13 runs the Redis container with TLS on by default (self-signed dev cert);
  # Dapr's Redis client skips certificate verification when enableTLS is set.
  - name: enableTLS
    value: "true"
  - name: processingTimeout
    value: 5s
  - name: redeliverInterval
    value: 1s
scopes:
- demo01-publisher
- demo01-subscriber
- demo02-subscriber
